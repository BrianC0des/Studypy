<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Studypy</title>
		<meta name="description" content="Studypy — sample HTML5 page" />
		<link rel="stylesheet" href="../style.css" />
	</head>

	<body>
		<header>
			<h1 id = "header">Studypy</h1>
		</header>

		<main>
            <div class = "top">
				<h2 id = "title">Student Resource Hub</h2>
				<p id = "Description">Centralized collection of learning resources for students</p>
            </div>
            <div id = "tools-container">
                <div class = "Tools">
                    <a id = "links" href="https://docs.docker.com/" target="_blank" title = "Docker Documentation Website">
                    <h2> Docker Documentation</h2>
                    </a>
                    <h5> Learn containerization with Docker - essential for modern development.</h5>
                    
                    <img id = "icons" src="../assets/icons/cloud.webp" alt="Webdev" title="Cloud and DevOps icon">
                </div>
                <div class = "Tools">
                    <a id = "links" href="https://kubernetes.io/docs/tutorials/kubernetes-basics/" target="_blank" title = "Kubernetes Website">
                    <h2> Kubernetes Basics</h2>
                    </a>
                    <h5> Official Kubernetes tutorials for container orchestration.</h5>
                    
                    <img id = "icons" src="../assets/icons/cloud.webp" alt="Webdev" title="Cloud and DevOps icon">
                </div>
            </div>
		</main>
	</body>
</html>
