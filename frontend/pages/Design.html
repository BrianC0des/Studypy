<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Studypy</title>
		<meta name="description" content="Studypy — sample HTML5 page" />
		<link rel="stylesheet" href="../style.css" />
	</head>

	<body>
		<div id="navbar-placeholder"></div>

		<main>
            <div class="top">
				<h2 id="title">Student Resource Hub</h2>
				<p id="Description">Centralized collection of learning resources for students</p>
            </div>
            <div id="tools-container">
                <div class="Tools">
                    <a id="links" href="https://www.refactoringui.com/" target="_blank" title="Refactoring UI Website">
                    <h2> Refactoring UI</h2>
                    </a>
                    <h5> Learn to design beautiful user interfaces by yourself using design principles.</h5>
                    
                    <img id="icons" src="../assets/icons/UX.jpg" alt="Webdev" title="UI and UX icon">
                </div>
                <div class="Tools">
                    <a id="links" href="https://lawsofux.com/" target="_blank" title="Laws of UX Website">
                    <h2> Laws of UX</h2>
                    </a>
                    <h5> Collection of design principles and maxims for creating better user experiences.</h5>
                    
                    <img id="icons" src="../assets/icons/UX.jpg" alt="Webdev" title="UI and UX icon">
                </div>
            </div>

            <!-- SAGINGNATION-->
            <section class="Pagination">
                <div>&#171;</div>
                <div>&#8592; Back</div>
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
                <div>5</div>
                <div>Next &#8594;</div>
                <div>&#187;</div>
            </section>

		</main>

		<script src="../script.js"></script>
	</body>
</html>
